# Tools Configuration
# Format: [tool_name]
# display_name=Human Readable Name
# description=Short description

[health-check]
display_name=Health Check
description=Run system health and container diagnosis

[update]
display_name=Update All Containers
description=Pull latest images and recreate containers

[backup-databases]
display_name=Backup Databases
description=Create archives of PostgreSQL and other databases

[backup-credentials]
display_name=Backup Credentials
description=Securely archive important secrets

[generate-self-signed-cert]
display_name=Generate Self-Signed Cert
description=Create temporary certificates for local development

[setup-dashboard]
display_name=Setup Dashboard
description=Configure the main status dashboard
